<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DeltaDotta terminal onboarding demo</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; background: #0b1020; display: grid; place-items: center; font-family: Menlo, Monaco, Consolas, monospace; }
      .terminal { width: min(1040px, calc(100vw - 40px)); overflow: hidden; border: 1px solid #334155; border-radius: 14px; background: #111827; box-shadow: 0 26px 80px rgba(0, 0, 0, .42); }
      .bar { height: 54px; display: flex; align-items: center; gap: 9px; padding: 0 22px; background: #1f2937; border-bottom: 1px solid #334155; color: #e5e7eb; font-size: 16px; }
      .dot { width: 12px; height: 12px; border-radius: 50%; }
      .red { background: #ef4444; } .yellow { background: #f59e0b; } .green { background: #84cc16; }
      .label { margin-left: 8px; color: #cbd5e1; }
      #lines { min-height: 610px; padding: 32px 36px; }
      .line { min-height: 32px; white-space: pre-wrap; font-size: 18px; line-height: 1.8; color: #e5e7eb; }
      .command, .success { color: #b9f227; font-weight: 700; }
      .muted { color: #a8b1c2; }
      .answer { color: #f8fafc; }
      .spacer { min-height: 16px; }
      .cursor { display: inline-block; width: 9px; height: 20px; margin-left: 5px; vertical-align: -3px; background: #b9f227; animation: blink 1s step-end infinite; }
      @keyframes blink { 50% { opacity: 0; } }
    </style>
  </head>
  <body>
    <main class="terminal" aria-label="DeltaDotta guided terminal onboarding">
      <header class="bar"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span><span class="label" id="title"></span></header>
      <section id="lines"></section>
    </main>
    <script>
      const flows = {
        software: {
          title: "DeltaDotta · software Launchpad",
          lines: [
            ["command", "$ deltadotta"],
            ["spacer", ""],
            ["answer", "Δ Welcome to DeltaDotta"],
            ["muted", "Build a practical team map, set up one safe AI role, and open it for you."],
            ["spacer", ""],
            ["muted", "Step 1  Where is the team workspace?"],
            ["answer", "/projects/apex-cloud"],
            ["muted", "Step 2  What kind of team are you setting up?"],
            ["command", "› Software team"],
            ["muted", "Scanning local runbooks, workflows, ownership, and instructions..."],
            ["success", "Found 4 useful sources. They stay linked to the map."],
            ["muted", "Five quick confirmations, then you are ready."],
            ["answer", "1/5  Engineering owner       Engineering Lead"],
            ["answer", "2/5  Deploy authority        DevOps / Platform Engineer"],
            ["answer", "3/5  Escalation owner        Engineering Lead"],
            ["answer", "4/5  Handoff target          Engineering Lead"],
            ["answer", "5/5  AI workspace            Codex"],
            ["success", "✓ Software map created: 5 roles, 1 verified Platform role"],
            ["answer", "Codex context installed and preflight verified."],
            ["success", "✓ Launch complete: verified. Map and portable package created."],
          ],
        },
        manufacturing: {
          title: "DeltaDotta · manufacturing Launchpad",
          lines: [
            ["command", "$ deltadotta"],
            ["spacer", ""],
            ["answer", "Δ Welcome to DeltaDotta"],
            ["muted", "Build a practical team map, set up one safe AI role, and open it for you."],
            ["spacer", ""],
            ["muted", "Step 1  Where is the team workspace?"],
            ["answer", "/projects/orion-components"],
            ["muted", "Step 2  What kind of team are you setting up?"],
            ["command", "› Manufacturing team"],
            ["muted", "Scanning local runbooks, quality, maintenance, and line-stop instructions..."],
            ["success", "Found 4 useful sources. They stay linked to the map."],
            ["muted", "Five quick confirmations, then you are ready."],
            ["answer", "1/5  Operations owner        Manufacturing Director"],
            ["answer", "2/5  Safety authority        Production Operations Lead"],
            ["answer", "3/5  Escalation owner        Manufacturing Director"],
            ["answer", "4/5  Handoff target          Maintenance Lead"],
            ["answer", "5/5  AI workspace            Codex"],
            ["success", "✓ Manufacturing map created: 5 roles, 1 verified Operations role"],
            ["answer", "Codex context installed and preflight verified."],
            ["success", "✓ Launch complete: verified. Map and portable package created."],
          ],
        },
      };

      const params = new URLSearchParams(location.search);
      const flow = flows[params.get("team")] || flows.software;
      const stage = Math.max(1, Math.min(flow.lines.length, Number(params.get("stage")) || flow.lines.length));
      document.querySelector("#title").textContent = flow.title;
      const target = document.querySelector("#lines");
      flow.lines.slice(0, stage).forEach(([kind, text]) => {
        const line = document.createElement("div");
        line.className = `line ${kind}`;
        line.textContent = text;
        target.append(line);
      });
      if (stage < flow.lines.length) {
        const cursor = document.createElement("span");
        cursor.className = "cursor";
        target.append(cursor);
      }
    </script>
  </body>
</html>
